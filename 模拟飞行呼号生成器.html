<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模拟飞行呼号生成器BY:ZIYU YANG</title>
    <style>
      html {
        color-scheme: dark;
      }

      :root {
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.08);
        --card-2: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.68);
        --border: rgba(255, 255, 255, 0.14);
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        --accent: #7c5cff;
        --accent-2: #2ee59d;
        --danger: #ff5c7a;
        --ring: 0 0 0 4px rgba(124, 92, 255, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        font-size: 22.5px; /* +25% */
        line-height: 1.55;
        color: var(--text);
        background: radial-gradient(
            1200px 700px at 20% 10%,
            rgba(124, 92, 255, 0.24),
            transparent 55%
          ),
          radial-gradient(
            1000px 600px at 80% 30%,
            rgba(46, 229, 157, 0.16),
            transparent 60%
          ),
          radial-gradient(
            900px 540px at 50% 90%,
            rgba(255, 92, 122, 0.11),
            transparent 65%
          ),
          linear-gradient(180deg, #070b14, #0b1220);
        display: grid;
        place-items: center;
        padding: 36px 18px;
      }

      .wrap {
        width: min(1120px, 100%);
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .title {
        display: grid;
        gap: 6px;
      }

      h1 {
        font-size: 35px; /* +25% */
        letter-spacing: 0.2px;
        margin: 0;
      }

      .byline {
        font-size: 0.72em;
        font-weight: 650;
        color: rgba(255, 255, 255, 0.68);
        margin-left: 8px;
        white-space: nowrap;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.45;
      }

      .card {
        background: linear-gradient(180deg, var(--card), var(--card-2));
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        border-radius: 18px;
        overflow: hidden;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .content {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 0;
      }

      @media (max-width: 860px) {
        .content {
          grid-template-columns: 1fr;
        }
      }

      .pane {
        padding: 22px;
      }

      .pane + .pane {
        border-left: 1px solid var(--border);
      }

      @media (max-width: 860px) {
        .pane + .pane {
          border-left: none;
          border-top: 1px solid var(--border);
        }
      }

      .sectionTitle {
        font-size: 13px;
        letter-spacing: 0.12em;
        color: rgba(255, 255, 255, 0.58);
        text-transform: uppercase;
        margin: 0 0 12px 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .sectionTitle::after {
        content: "";
        height: 1px;
        flex: 1 1 auto;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.16),
          rgba(255, 255, 255, 0)
        );
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .row {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.78);
      }

      select,
      button,
      input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(9, 14, 26, 0.65);
        color: var(--text);
        padding: 11px 12px;
        outline: none;
        font-size: 20px; /* +25% */
        transition: border-color 0.2s ease, box-shadow 0.2s ease,
          background 0.2s ease, transform 0.06s ease;
      }

      select:focus,
      input:focus {
        border-color: rgba(124, 92, 255, 0.6);
        box-shadow: var(--ring);
      }

      select:hover,
      input:hover {
        border-color: rgba(255, 255, 255, 0.28);
        background: rgba(9, 14, 26, 0.72);
      }

      .combo {
        position: relative;
      }

      .comboInput {
        cursor: pointer;
      }

      .suggestions {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        z-index: 20;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(7, 10, 20, 0.86);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
        max-height: 320px; /* 下拉联想框更“长” */
        overflow: auto;
        padding: 6px;
        display: none;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .suggestions.show {
        display: block;
      }

      .suggestionItem {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 10px;
        cursor: pointer;
        user-select: none;
      }

      .suggestionItem:hover {
        background: rgba(124, 92, 255, 0.16);
      }

      .suggestionIcao {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.92);
        flex: 0 0 auto;
      }

      .suggestionName {
        color: rgba(255, 255, 255, 0.70);
        flex: 1 1 auto;
        text-align: right;
      }

      .suggestionName.left {
        text-align: left;
      }

      .btnRow {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 6px;
      }

      @media (max-width: 520px) {
        .btnRow {
          grid-template-columns: 1fr;
        }
      }

      button {
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.18);
        transition: transform 0.06s ease, box-shadow 0.2s ease,
          border-color 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.28);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      }

      button:active {
        transform: translateY(1px);
      }

      .primary {
        background: linear-gradient(135deg, rgba(124, 92, 255, 0.95), rgba(46, 229, 157, 0.7));
        border-color: rgba(124, 92, 255, 0.35);
        box-shadow: 0 12px 34px rgba(124, 92, 255, 0.18);
        font-weight: 650;
      }

      .primary:hover {
        box-shadow: 0 18px 54px rgba(124, 92, 255, 0.22);
      }

      .secondary {
        background: rgba(255, 255, 255, 0.06);
      }

      .resultCard {
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: linear-gradient(
          180deg,
          rgba(7, 10, 20, 0.62),
          rgba(7, 10, 20, 0.46)
        );
        padding: 18px;
        display: grid;
        gap: 12px;
      }

      .big {
        font-size: 52.5px; /* +25% */
        letter-spacing: 0.08em;
        font-weight: 800;
        margin: 0;
        line-height: 1.1;
        text-align: center;
        text-shadow: 0 16px 44px rgba(0, 0, 0, 0.45);
      }

      .meta {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.4;
      }

      .pillRow {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .pill {
        font-size: 14px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.78);
      }

      .hint {
        margin: 10px 0 0 0;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.62);
      }

      .warn {
        margin: 10px 0 0 0;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.72);
        border-left: 3px solid rgba(255,  92, 122, 0.85);
        padding-left: 10px;
      }

      .kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 13px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        padding: 1px 6px;
        border-radius: 8px;
        color: rgba(255, 255, 255, 0.86);
      }

      footer {
        margin-top: 14px;
        color: rgba(255, 255, 255, 0.52);
        font-size: 13px;
        line-height: 1.45;
      }

      a {
        color: rgba(124, 92, 255, 0.95);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="title">
          <h1>
            模拟飞行呼号生成器<span class="byline">BY:ZIYU YANG</span>
          </h1>
          <p class="sub">
          </p>
        </div>
      </header>

      <div class="card">
        <div class="content">
          <section class="pane">
            <p class="sectionTitle">生成设置</p>
            <div class="grid">
              <div class="row">
                <label for="routeType">航线类型</label>
                <select id="routeType" style="display: none">
                  <option value="domestic">国内航线（4位航班号）</option>
                  <option value="international">国外航线（3位航班号）</option>
                </select>
                <div class="combo">
                  <input
                    id="routeTypeInput"
                    class="comboInput"
                    readonly
                    aria-haspopup="listbox"
                    aria-expanded="false"
                    placeholder="请选择航线类型"
                  />
                  <div id="routeTypeSuggestions" class="suggestions" role="listbox"></div>
                </div>
              </div>

              <div class="row">
                <label for="airlineInput">选择航司</label>
                <div class="combo">
                  <input
                    id="airlineInput"
                    inputmode="latin"
                    autocomplete="off"
                    spellcheck="false"
                    placeholder="例如：CCA"
                  />
                  <div id="airlineSuggestions" class="suggestions" role="listbox"></div>
                </div>
                <p class="hint" style="margin: 6px 0 0 0">
                  键入会自动提示并匹配（例如输入 C 会提示 CCA/CES/CSN…）
                </p>
              </div>

              <div class="btnRow">
                <button id="generateBtn" class="primary" type="button">
                  生成呼号
                </button>
                <button id="copyBtn" class="secondary" type="button">
                  复制结果
                </button>
              </div>

              <p id="copyStatus" class="hint" aria-live="polite"></p>
            </div>
          </section>

          <section class="pane">
            <p class="sectionTitle">生成结果</p>
            <div class="resultCard">
              <p id="callsign" class="big">———</p>
              <div class="pillRow">
                <span class="pill" id="pillRoute">航线：国内</span>
                <span class="pill" id="pillAirline">航司：—</span>
                <span class="pill" id="pillDigits">位数：4</span>
              </div>
              <div class="meta" id="meta">
              </div>
            </div>
          </section>
        </div>
      </div>

    </div>

    <script>
      /**
       * 国内航司 ICAO 三字码（常见航司示例）
       * 你可以按需要增删/修改。
       */
      const AIRLINES = [
        { name: "中国国际航空 Air China", icao: "CCA" },
        { name: "中国东方航空 China Eastern", icao: "CES" },
        { name: "中国南方航空 China Southern", icao: "CSN" },
        { name: "海南航空 Hainan Airlines", icao: "CHH" },
        { name: "深圳航空 Shenzhen Airlines", icao: "CSZ" },
        { name: "厦门航空 XiamenAir", icao: "CXA" },
        { name: "四川航空 Sichuan Airlines", icao: "CSC" },
        { name: "山东航空 Shandong Airlines", icao: "CDG" },
        { name: "春秋航空 Spring Airlines", icao: "CQH" },
        { name: "吉祥航空 Juneyao Air", icao: "DKH" }
      ];

      const routeTypeEl = document.getElementById("routeType");
      const routeTypeInputEl = document.getElementById("routeTypeInput");
      const routeTypeSuggestionsEl = document.getElementById("routeTypeSuggestions");
      const airlineInputEl = document.getElementById("airlineInput");
      const airlineSuggestionsEl = document.getElementById("airlineSuggestions");
      const generateBtn = document.getElementById("generateBtn");
      const copyBtn = document.getElementById("copyBtn");
      const callsignEl = document.getElementById("callsign");
      const copyStatusEl = document.getElementById("copyStatus");

      const pillRouteEl = document.getElementById("pillRoute");
      const pillAirlineEl = document.getElementById("pillAirline");
      const pillDigitsEl = document.getElementById("pillDigits");

      function padLeft(num, digits) {
        return String(num).padStart(digits, "0");
      }

      const ROUTE_TYPES = [
        { value: "domestic", label: "国内航线（4位航班号）" },
        { value: "international", label: "国外航线（3位航班号）" }
      ];

      function randomIntInclusive(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function generateFlightNumber({ digits }) {
        // 不允许前导 0：最高位至少 1
        const min = Math.pow(10, digits - 1);
        const max = Math.pow(10, digits) - 1;
        return String(randomIntInclusive(min, max));
      }

      function normalizeIcaoInput(value) {
        return String(value || "")
          .toUpperCase()
          .replace(/[^A-Z]/g, "")
          .slice(0, 3);
      }

      function buildAirlineOptions() {
        // 自定义联想列表：无需预先插入 option
      }

      function syncInput() {
        const v = normalizeIcaoInput(airlineInputEl.value);
        if (!airlineInputEl.value) return;
        if (airlineInputEl.value !== v) airlineInputEl.value = v;
      }

      function filterAirlines(query) {
        if (!query) return AIRLINES;
        return AIRLINES.filter(
          (a) =>
            a.icao.startsWith(query) ||
            a.name.toLowerCase().includes(query.toLowerCase())
        );
      }

      function setSuggestionsVisible(visible) {
        airlineSuggestionsEl.classList.toggle("show", visible);
      }

      function setRouteTypeSuggestionsVisible(visible) {
        routeTypeSuggestionsEl.classList.toggle("show", visible);
        routeTypeInputEl.setAttribute("aria-expanded", visible ? "true" : "false");
      }

      function renderSuggestions() {
        const q = normalizeIcaoInput(airlineInputEl.value);
        const list = filterAirlines(q);
        airlineSuggestionsEl.innerHTML = "";

        for (const a of list) {
          const item = document.createElement("div");
          item.className = "suggestionItem";
          item.setAttribute("role", "option");
          item.dataset.icao = a.icao;
          item.innerHTML = `<span class="suggestionIcao">${a.icao}</span><span class="suggestionName">${a.name}</span>`;
          item.addEventListener("mousedown", (e) => {
            // mousedown 先于 blur：避免点选时列表先消失
            e.preventDefault();
            airlineInputEl.value = a.icao;
            setSuggestionsVisible(false);
          });
          airlineSuggestionsEl.appendChild(item);
        }

        setSuggestionsVisible(list.length > 0);
      }

      function setRouteTypeDisplayFromSelect() {
        const selected = ROUTE_TYPES.find((r) => r.value === routeTypeEl.value);
        routeTypeInputEl.value = selected?.label || "";
      }

      function renderRouteTypeSuggestions() {
        routeTypeSuggestionsEl.innerHTML = "";

        for (const r of ROUTE_TYPES) {
          const item = document.createElement("div");
          item.className = "suggestionItem";
          item.setAttribute("role", "option");
          item.dataset.value = r.value;
          item.innerHTML = `<span class="suggestionName left">${r.label}</span>`;
          item.addEventListener("mousedown", (e) => {
            e.preventDefault();
            routeTypeEl.value = r.value;
            setRouteTypeDisplayFromSelect();
            setRouteTypeSuggestionsVisible(false);
            setPills({
              routeType: routeTypeEl.value,
              airlineIcao: getAirlineIcao(),
              digits: routeTypeEl.value === "domestic" ? 4 : 3
            });
          });
          routeTypeSuggestionsEl.appendChild(item);
        }

        setRouteTypeSuggestionsVisible(true);
      }

      function getAirlineIcao() {
        const v = normalizeIcaoInput(airlineInputEl.value);
        return /^[A-Z]{3}$/.test(v) ? v : "";
      }

      function setPills({ routeType, airlineIcao, digits }) {
        pillRouteEl.textContent =
          routeType === "domestic" ? "航线：国内" : "航线：国外";
        pillAirlineEl.textContent = `航司：${airlineIcao || "—"}`;
        pillDigitsEl.textContent = `位数：${digits}`;
      }

      function generateCallsign() {
        const routeType = routeTypeEl.value;
        const airlineIcao = getAirlineIcao();
        const digits = routeType === "domestic" ? 4 : 3;

        if (!airlineIcao) {
          copyStatusEl.textContent = "请先选择航司或输入 3 位 ICAO 代码。";
          return;
        }

        const flightNo = generateFlightNumber({ digits });
        const callsign = `${airlineIcao}${flightNo}`;

        callsignEl.textContent = callsign;
        setPills({ routeType, airlineIcao, digits });
        copyStatusEl.textContent = "";
      }

      async function copyCallsign() {
        const text = callsignEl.textContent.trim();
        if (!text || text === "———") {
          copyStatusEl.textContent = "请先生成呼号。";
          return;
        }

        try {
          await navigator.clipboard.writeText(text);
          copyStatusEl.textContent = `已复制：${text}`;
        } catch {
          // 兼容旧浏览器/非安全上下文：选中文本提示用户手动复制
          const range = document.createRange();
          range.selectNodeContents(callsignEl);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          copyStatusEl.textContent =
            "浏览器限制自动复制：已选中结果，请按 Ctrl+C 复制。";
        }
      }

      buildAirlineOptions();
      // 初始不预选航司：保持为空
      airlineInputEl.value = "";
      setRouteTypeDisplayFromSelect();
      setPills({
        routeType: routeTypeEl.value,
        airlineIcao: getAirlineIcao(),
        digits: routeTypeEl.value === "domestic" ? 4 : 3
      });

      generateBtn.addEventListener("click", generateCallsign);
      copyBtn.addEventListener("click", copyCallsign);
      routeTypeInputEl.addEventListener("focus", () => {
        renderRouteTypeSuggestions();
      });
      routeTypeInputEl.addEventListener("click", () => {
        renderRouteTypeSuggestions();
      });
      routeTypeInputEl.addEventListener("blur", () => {
        window.setTimeout(() => setRouteTypeSuggestionsVisible(false), 120);
      });
      airlineInputEl.addEventListener("input", () => {
        syncInput();
        renderSuggestions();
      });
      airlineInputEl.addEventListener("focus", () => {
        renderSuggestions();
      });
      airlineInputEl.addEventListener("blur", () => {
        // 给点击条目一点时间
        window.setTimeout(() => setSuggestionsVisible(false), 120);
      });

      // Enter 触发生成
      window.addEventListener("keydown", (e) => {
        if (e.key === "Enter") generateCallsign();
      });

      // 允许 ESC 关闭下拉
      window.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        setRouteTypeSuggestionsVisible(false);
        setSuggestionsVisible(false);
      });
    </script>
  </body>
</html>
